<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="app.css">
    
    <title>Document</title>
</head>
<body>
    <div class="app_div">
      <div class="head">
        <h1>Weather Forecasting App</h1> 
      </div>
       

       <div class="panel_ForSearch">
         <input type="text" id="textInput" placeholder="Enter city name">
    </div>

 <div class="render_State">
  <div class="weatherResult" id="weather_result">
     
    <div class="box1" id="forCity">
     
    </div>

    <div class="see_More" id="result">
  <div class="box1" id="airPressure">
    <div id="pressureElm">
     
    </div>
  </div>
    <div class="box1" id="condition">
      <div id="conditionElm">
        
      </div>
    </div>
    <div class="box1" id="humidity">
      <div id="humidityElm">
        
      </div>
    </div>
    <div class="box1" id="windSpeed">
      <div id="windElm">
      
      </div>
    </div>
    <div class="box1" id="weather">
      <div id="weatherElm">
       
      </div>
    </div>
    <div class="box1" id="visibility">
      <div id="visibleElm">

      </div>
    </div>
    <div class="box1" id="feels">
      <div id="feelElm">

      </div>
    </div>
    <div class="box1" id="sunrise">
      <div id="sunriseElm">
        <div id="sunriseIcon"></div>
      </div>
    </div>
    <div class="box1" id="sunset">
      <div id="sunsetElm">
         <div id="sunsetIcon"></div>
      </div>
    </div>

    </div>
    
  </div>
  </div>

    </div>
 

    
    <script src="app.js"></script>
</body>
</html>
